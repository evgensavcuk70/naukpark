# Конфігурація nginx для Laravel
# nginx приймає запити з браузера і передає PHP-файли в php-fpm (контейнер "app")

server {
    listen 80;
    server_name localhost;

    # Laravel "видає" сайт із папки public - саме туди треба дивитись
    root /var/www/html/public;
    index index.php index.html;

    # Логи всередині контейнера (зручно дивитись через docker compose logs)
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Збільшуємо ліміт на розмір завантажуваних файлів (картинки, документи)
    client_max_body_size 64M;

    location / {
        # Якщо файл не знайдено - все одно віддаємо index.php (так працює роутинг Laravel)
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Всі .php файли передаємо в PHP-FPM контейнер під назвою "app" на порту 9000
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Збільшуємо таймаути для довгих операцій (backup, обробка великих файлів)
        fastcgi_connect_timeout 300s;
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;
    }

    # Забороняємо доступ до прихованих файлів (наприклад .env, .git)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
